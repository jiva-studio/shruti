name: release

# Build all three Shruti binaries and publish them as release assets.
# Public repo → GitHub Actions is free, including the macos-14 (Apple Silicon)
# runner that builds the ANE Swift binary. Hosts consume these pinned artifacts
# (nix fetchurl); nothing is built on mridanga/yoga.
#
#   tag vX.Y.Z  → fluidstreamd-aarch64-darwin, streamd-aarch64-darwin,
#                 shruti-x86_64-linux  attached to the GitHub release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: # manual build (no release upload unless a tag is present)

permissions:
  contents: write

jobs:
  host-darwin:
    name: host binaries (aarch64-darwin)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      # swift ships with the macos-14 image (Xcode). `make -C host build` runs
      # `swift build -c release` (fluidstreamd) + `go build` (streamd).
      - name: Build host binaries
        env:
          GOWORK: "off" # resolve proto via replace; ignore the client module
        run: make -C host build
      - name: Ad-hoc codesign fluidstreamd (ANE, local-run only)
        run: codesign -s - -f host/bin/fluidstreamd
      - name: Stage assets
        run: |
          mkdir -p dist
          cp host/bin/fluidstreamd dist/fluidstreamd-aarch64-darwin
          cp host/bin/streamd      dist/streamd-aarch64-darwin
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: host-darwin
          path: dist/*
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  client-linux:
    name: client binary (x86_64-linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install webkit + gtk (Wails runtime/build deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1
      - name: Build client
        run: make -C client build
      - name: Stage asset
        run: |
          mkdir -p dist
          cp client/build/bin/shruti dist/shruti-x86_64-linux
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-linux
          path: dist/*
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
